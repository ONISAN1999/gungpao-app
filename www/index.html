<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="กุ้งเผา">
<title>ร้านกุ้งเผา – จัดการออร์เดอร์</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  :root{
    --glass: rgba(255,255,255,0.14);
    --glass-strong: rgba(255,255,255,0.22);
    --stroke: rgba(255,255,255,0.35);
    --ink:#10131f;--white:#ffffff;
    --ok:#2fbf71;--warn:#f5a524;--danger:#f43f5e;
    --shadow: 0 10px 30px rgba(20,20,40,0.25);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Sarabun","Noto Sans Thai",sans-serif;
    color:var(--white);background:#0f1220;overflow:hidden;position:fixed;width:100%;-webkit-font-smoothing:antialiased}
  .bg-mesh{position:fixed;inset:0;overflow:hidden;z-index:-1;
    background:radial-gradient(1200px 600px at 20% 10%, #ff8fb1 0%, transparent 45%),
               radial-gradient(1000px 700px at 90% 20%, #ffd18f 0%, transparent 40%),
               radial-gradient(1000px 800px at 50% 100%, #8fb8ff 0%, transparent 45%),#0f1220}
  .blob{position:absolute;border-radius:50%;filter:blur(60px);opacity:.55;animation:float 14s ease-in-out infinite}
  .blob-1{width:280px;height:280px;background:#ff6f91;top:-40px;left:-40px}
  .blob-2{width:320px;height:320px;background:#ffb86c;top:30%;right:-80px;animation-delay:-4s}
  .blob-3{width:300px;height:300px;background:#6f9bff;bottom:-60px;left:20%;animation-delay:-8s}
  @keyframes float{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-30px) scale(1.08)}}

  .app{height:100%;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top)}
  header.top{position:relative;margin:calc(10px + env(safe-area-inset-top)) 14px 8px;padding:13px 88px 11px;text-align:center;
    background:rgba(20,22,40,.5);backdrop-filter:blur(22px) saturate(1.5);-webkit-backdrop-filter:blur(22px) saturate(1.5);
    border:1px solid rgba(255,255,255,.16);border-radius:24px;box-shadow:0 12px 36px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.12)}
  header.top .brand{font-size:11px;letter-spacing:3px;opacity:.75;text-transform:uppercase;font-weight:700}
  header.top h1{font-size:19px;font-weight:800;margin-top:3px;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    background:linear-gradient(120deg,#fff 20%,#ffe1e8 60%,#ffb9ca);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .clock{font-size:11.5px;opacity:.7;margin-top:3px}
  main{flex:1;overflow-y:auto;padding:8px 14px 130px;-webkit-overflow-scrolling:touch}

  .summary{display:flex;gap:8px;margin:6px 2px 14px}
  .chip{flex:1;background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
        border:1px solid var(--stroke);border-radius:16px;padding:10px 8px;text-align:center;box-shadow:var(--shadow)}
  .chip .n{font-size:22px;font-weight:800;line-height:1}
  .chip .l{font-size:11px;opacity:.8;margin-top:3px}
  .chip.warn .n{color:#ffe08a}
  .chip.danger .n{color:#ffb3bf}

  .card{position:relative;background:rgba(27,30,51,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
        border:1px solid var(--stroke);border-radius:22px;padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow);
        overflow:hidden;transition:transform .15s ease}
  .card:active{transform:scale(.99)}
  .card .accent{position:absolute;left:0;top:0;bottom:0;width:6px}
  .card.ok .accent{background:var(--ok)}
  .card.warn .accent{background:var(--warn)}
  .card.danger .accent{background:var(--danger);animation:pulse 1.2s infinite}
  .card.plain .accent{background:#6f9bff}
  .card.t0 .accent{background:#2fbf71}
  .card.t30 .accent{background:#f5c524}
  .card.t40 .accent{background:#f59524}
  .card.t50 .accent{background:#f4683f;animation:pulse 1.6s infinite}
  .card.t60 .accent{background:#f43f5e;animation:pulse 1.1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .card .row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .card .title{font-size:17px;font-weight:800}
  .card .sub{font-size:12.5px;opacity:.85;margin-top:2px;line-height:1.4}
  .card .dorm{display:inline-block;font-size:12px;font-weight:700;background:rgba(111,155,255,.25);color:#d5e3ff;
    padding:2px 9px;border-radius:999px;margin-top:6px}
  .timer{text-align:right;flex-shrink:0;margin-left:8px;max-width:46%}
  .card .title{overflow-wrap:anywhere}
  .timer .big{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
  .timer .lbl{font-size:10px;opacity:.8;text-transform:uppercase;letter-spacing:1px}
  .timer .sm{font-size:12px;opacity:.9;margin-top:4px;font-weight:700}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;margin-top:8px}
  .badge.ok,.badge.t0{background:rgba(47,191,113,.25);color:#c9ffe0}
  .badge.warn{background:rgba(245,165,36,.28);color:#ffe6b8}
  .badge.danger{background:rgba(244,63,94,.3);color:#ffd0d8}
  .badge.gray{background:rgba(255,255,255,.15);color:#e6e8f0}
  .badge.t30{background:rgba(245,197,36,.28);color:#fff0c2}
  .badge.t40{background:rgba(245,149,36,.3);color:#ffe0b8}
  .badge.t50{background:rgba(244,104,63,.32);color:#ffd9c8}
  .badge.t60{background:rgba(244,63,94,.32);color:#ffd0d8}

  .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .btn.sq{flex:1 1 0;min-width:50px;height:44px;padding:0;font-size:17px;display:flex;align-items:center;justify-content:center}
  .btn.main{flex:1 1 100%;height:48px;font-size:15px}
  .num-chip{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;
    background:linear-gradient(135deg,#ff7a9a,#ff9d6c);color:#fff;font-size:13px;font-weight:800;
    margin-right:8px;vertical-align:-4px;box-shadow:0 2px 5px rgba(0,0,0,.3);flex-shrink:0}
  .pinwrap{display:flex;flex-direction:column;align-items:center;gap:3px}
  .pname{max-width:92px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:rgba(20,22,40,.88);
    border:1px solid rgba(255,255,255,.25);color:#fff;font-size:10.5px;font-weight:800;padding:2px 8px;
    border-radius:999px;box-shadow:0 2px 5px rgba(0,0,0,.4)}
  .btn{flex:1;border:none;border-radius:14px;padding:11px;font-size:14px;font-weight:700;color:#fff;
       background:var(--glass-strong);border:1px solid var(--stroke);backdrop-filter:blur(10px)}
  .btn:active{transform:scale(.96)}
  .btn.done{background:linear-gradient(135deg,#2fbf71,#1f9a58);border-color:transparent}
  .btn.del{flex:0 0 46px;background:rgba(244,63,94,.22);border-color:rgba(244,63,94,.4)}
  .btn.del.main{flex:1 1 100%;height:44px;font-size:14px;white-space:nowrap}
  .btn.go{background:linear-gradient(135deg,#6f9bff,#4f7de0);border-color:transparent}
  .btn.mapnav{background:linear-gradient(135deg,#22c1c3,#3a86ff);border-color:transparent}
  .btn.pinbtn{flex:0 0 46px;font-size:17px}
  .btn.edit{flex:0 0 46px;font-size:17px}
  .btn.mini{flex:0 0 44px;font-size:17px;padding:9px}
  .rider-num{position:absolute;top:12px;right:14px;width:30px;height:30px;border-radius:50%;
    background:linear-gradient(135deg,#ff7a9a,#ff9d6c);display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:15px;box-shadow:0 3px 10px rgba(255,120,150,.5)}
  .move-col{display:flex;flex-direction:column;gap:4px}
  .empty{text-align:center;opacity:.7;padding:50px 20px;font-size:14px}
  .empty .big{font-size:44px;margin-bottom:10px}
  .toolbar{display:flex;gap:8px;margin:-4px 2px 12px}
  .toolbar button{flex:1;background:var(--glass);border:1px solid var(--stroke);color:#fff;border-radius:14px;
    padding:10px;font-size:13px;font-weight:700;backdrop-filter:blur(12px)}
  .toolbar button:active{transform:scale(.97)}
  .toolbar button.navbtn{background:linear-gradient(135deg,#22c1c3,#3a86ff);border-color:transparent;color:#fff}
  .section-h{font-size:13px;font-weight:800;opacity:.9;margin:6px 4px 10px;letter-spacing:.3px}
  .sales-row{display:flex;gap:10px;margin:4px 2px 12px}
  .sbox{flex:1;background:linear-gradient(135deg,rgba(47,191,113,.28),rgba(34,193,195,.18));border:1px solid rgba(47,191,113,.5);
    border-radius:18px;padding:14px;box-shadow:var(--shadow)}
  .sbox.alt{background:linear-gradient(135deg,rgba(255,157,108,.25),rgba(255,122,154,.18));border-color:rgba(255,157,108,.5)}
  .sbox .sv{font-size:23px;font-weight:800;line-height:1}
  .sbox .sl{font-size:11px;opacity:.9;margin-top:5px}
  /* cart in order modal */
  .cart{background:rgba(255,255,255,.06);border:1px solid var(--stroke);border-radius:14px;padding:8px;margin-top:6px}
  .cart .line{display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid rgba(255,255,255,.08)}
  .cart .line:last-child{border-bottom:none}
  .cart .line .nm{flex:1;font-size:13.5px;line-height:1.25}
  .cart .line .pr{font-size:12.5px;opacity:.8;min-width:52px;text-align:right}
  .cart .qty{display:flex;align-items:center;gap:6px}
  .cart .qty button{width:28px;height:28px;border-radius:9px;border:1px solid var(--stroke);background:rgba(255,255,255,.12);color:#fff;font-size:16px;font-weight:800}
  .cart .qty span{min-width:20px;text-align:center;font-weight:800}
  .cart .empty-c{text-align:center;opacity:.6;font-size:13px;padding:10px}
  .cart-total{display:flex;justify-content:space-between;align-items:center;padding:8px 4px 2px;font-weight:800;font-size:16px}
  .addmenu{width:100%;background:rgba(47,191,113,.16);border:1px solid rgba(47,191,113,.5);color:#c9ffe0;border-radius:12px;padding:11px;font-size:14px;font-weight:700;margin-top:8px}
  .pretoggle{display:flex;align-items:center;justify-content:space-between;background:rgba(160,107,255,.14);border:1px solid rgba(160,107,255,.45);border-radius:12px;padding:11px 14px;font-size:14px;font-weight:700;color:#e6d8ff;cursor:pointer}
  .pretoggle.on{background:rgba(160,107,255,.28)}
  /* menu picker overlay */
  #menuPick{position:fixed;inset:0;z-index:210;display:none;flex-direction:column;background:#0f1220}
  #menuPick.show{display:flex}
  .mp-top{padding:calc(12px + env(safe-area-inset-top)) 14px 10px;background:rgba(20,22,40,.85);backdrop-filter:blur(14px);
    display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px;border-bottom:1px solid var(--stroke)}
  .mp-cats{display:flex;gap:6px;overflow-x:auto;padding:8px 12px;background:rgba(20,22,40,.6);white-space:nowrap}
  .mp-cats button{flex:0 0 auto;background:rgba(255,255,255,.1);border:1px solid var(--stroke);color:#fff;border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:700}
  .mp-cats button.sel{background:#fff;color:#10131f}
  .mp-list{flex:1;overflow-y:auto;padding:8px 12px 12px}
  .mp-cat-h{font-size:13px;font-weight:800;opacity:.8;margin:14px 4px 8px}
  .mp-item{display:flex;align-items:center;gap:10px;background:var(--glass);border:1px solid var(--stroke);border-radius:14px;padding:11px 12px;margin-bottom:8px}
  .mp-item .info{flex:1;min-width:0}
  .mp-item .info .nm{font-size:14px;font-weight:700;line-height:1.25}
  .mp-item .info .pr{font-size:12.5px;opacity:.85;margin-top:2px}
  .mp-item .add{flex:0 0 auto;display:flex;align-items:center;gap:8px}
  .mp-item .add button{width:32px;height:32px;border-radius:10px;border:none;background:linear-gradient(135deg,#ff7a9a,#ff9d6c);color:#fff;font-size:18px;font-weight:800}
  .mp-item .add .q{min-width:20px;text-align:center;font-weight:800}
  .mp-bot{padding:12px 14px calc(14px + env(safe-area-inset-bottom));background:rgba(20,22,40,.9);backdrop-filter:blur(14px);border-top:1px solid var(--stroke);display:flex;align-items:center;gap:12px}
  .mp-bot .tot{flex:1;font-weight:800;font-size:16px}
  .mp-bot .done{background:linear-gradient(135deg,#2fbf71,#1f9a58);border:none;color:#fff;font-size:15px;font-weight:800;padding:13px 22px;border-radius:14px}

  /* Map */
  #mapWrap{position:relative;z-index:0;isolation:isolate;height:44vh;min-height:280px;border-radius:22px;overflow:hidden;
    border:1px solid var(--stroke);box-shadow:var(--shadow);margin-bottom:14px;background:#1a1d2e}
  #map{position:absolute;inset:0}
  .map-overlay{position:absolute;z-index:500}
  .map-status{top:12px;left:12px;background:rgba(20,22,40,.6);backdrop-filter:blur(12px);border:1px solid var(--stroke);
    border-radius:14px;padding:7px 12px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px;pointer-events:none}
  .dotpulse{width:9px;height:9px;border-radius:50%;background:#3a86ff;box-shadow:0 0 0 0 rgba(58,134,255,.6);animation:ring 1.6s infinite}
  .dotpulse.off{background:#f5a524;animation:none}
  @keyframes ring{0%{box-shadow:0 0 0 0 rgba(58,134,255,.6)}70%{box-shadow:0 0 0 10px rgba(58,134,255,0)}100%{box-shadow:0 0 0 0 rgba(58,134,255,0)}}
  .map-btns{right:12px;bottom:12px;display:flex;flex-direction:column;gap:8px}
  .mbtn{width:46px;height:46px;border-radius:15px;background:rgba(20,22,40,.7);backdrop-filter:blur(14px);
    border:1px solid var(--stroke);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
  .mbtn:active{transform:scale(.92)}
  .mbtn.on{background:linear-gradient(135deg,#3a86ff,#22c1c3);border-color:transparent}
  .pin{width:30px;height:30px;border-radius:50% 50% 50% 2px;transform:rotate(45deg);
    background:linear-gradient(135deg,#ff7a9a,#ff9d6c);border:2px solid #fff;box-shadow:0 3px 8px rgba(0,0,0,.4);
    display:flex;align-items:center;justify-content:center}
  .pin span{transform:rotate(-45deg);color:#fff;font-weight:800;font-size:14px}
  .bmark{position:relative;width:48px;height:60px;filter:drop-shadow(0 3px 4px rgba(0,0,0,.45))}
  .bmark .bnum{position:absolute;top:-3px;right:-4px;background:linear-gradient(135deg,#ff7a9a,#ff9d6c);color:#fff;
    width:21px;height:21px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:800;box-shadow:0 2px 5px rgba(0,0,0,.35)}
  .rider-dot{width:22px;height:22px;border-radius:50%;background:#3a86ff;border:3px solid #fff;
    box-shadow:0 0 0 6px rgba(58,134,255,.25),0 2px 6px rgba(0,0,0,.4)}
  .userpin{display:flex;align-items:center;gap:4px;background:rgba(20,22,40,.85);border:2px solid #2fbf71;border-radius:999px;
    padding:2px 8px 2px 3px;box-shadow:0 2px 6px rgba(0,0,0,.4);white-space:nowrap}
  .userpin.stale{border-color:#8891a5;opacity:.7}
  .userpin .ue{font-size:15px}
  .userpin .un{font-size:11px;font-weight:800;color:#fff}
  .leaflet-container{background:#1a1d2e;font-family:inherit}
  .leaflet-control-attribution{font-size:9px;background:rgba(20,22,40,.6)!important;color:#aaa!important}
  .leaflet-control-attribution a{color:#9ab!important}

  .fab{position:fixed;right:20px;bottom:96px;width:60px;height:60px;border-radius:50%;
    background:linear-gradient(135deg,#ff7a9a,#ff9d6c);border:none;color:#fff;font-size:32px;font-weight:300;
    box-shadow:0 12px 30px rgba(255,110,140,.5);z-index:40;display:flex;align-items:center;justify-content:center;padding-bottom:4px}
  .fab:active{transform:scale(.92)}

  .nav{position:fixed;left:14px;right:14px;bottom:calc(14px + env(safe-area-inset-bottom));height:66px;
    background:var(--glass-strong);backdrop-filter:blur(26px) saturate(1.4);-webkit-backdrop-filter:blur(26px) saturate(1.4);
    border:1px solid var(--stroke);border-radius:26px;box-shadow:var(--shadow);display:flex;padding:6px;z-index:50;overflow:hidden}
  .nav .pill{position:absolute;top:6px;height:54px;border-radius:20px;background:var(--white);opacity:.9;
    box-shadow:0 6px 16px rgba(0,0,0,.15);transition:left .28s cubic-bezier(.4,1.3,.5,1);z-index:0}
  .nav button{flex:1;background:none;border:none;color:#fff;font-weight:700;font-size:10.5px;z-index:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;position:relative}
  .nav button .ic{font-size:19px}
  .nav button.active{color:var(--ink)}
  .nav button .cnt{position:absolute;top:4px;margin-left:26px;background:var(--danger);color:#fff;font-size:10px;
    min-width:18px;height:18px;border-radius:9px;display:none;align-items:center;justify-content:center;padding:0 4px;font-weight:800}
  .nav button.hasnew .cnt{display:flex}

  .modal-bg{position:fixed;inset:0;background:rgba(10,12,24,.55);backdrop-filter:blur(6px);z-index:100;display:none;align-items:flex-end}
  .modal-bg.show{display:flex;animation:fade .2s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{width:100%;background:rgba(30,33,52,.94);backdrop-filter:blur(30px);border-top-left-radius:28px;border-top-right-radius:28px;
    border:1px solid var(--stroke);border-bottom:none;padding:22px 20px calc(24px + env(safe-area-inset-bottom));
    animation:slideup .3s cubic-bezier(.2,1,.3,1);max-height:92vh;overflow-y:auto}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal h2{font-size:19px;margin-bottom:16px;text-align:center}
  .field{margin-bottom:14px}
  .field label{font-size:12.5px;opacity:.85;display:block;margin-bottom:6px;font-weight:600}
  .field input,.field textarea{width:100%;background:rgba(255,255,255,.1);border:1px solid var(--stroke);
    border-radius:14px;padding:13px 14px;color:#fff;font-size:16px;font-family:inherit}
  .field input::placeholder,.field textarea::placeholder{color:rgba(255,255,255,.5)}
  .field input[type=datetime-local]{color-scheme:dark}
  .field textarea{resize:none;height:60px}
  .quick{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .quick button{background:rgba(255,255,255,.12);border:1px solid var(--stroke);color:#fff;border-radius:12px;padding:8px 14px;font-size:13px;font-weight:600}
  .quick button.sel{background:#fff;color:#10131f}
  .quick button.add{background:rgba(47,191,113,.18);border-color:rgba(47,191,113,.5);color:#c9ffe0}
  .locbtn{width:100%;background:rgba(58,134,255,.18);border:1px solid rgba(58,134,255,.5);color:#dbe7ff;border-radius:14px;padding:13px;font-size:14px;font-weight:700}
  .locbtn.set{background:rgba(47,191,113,.2);border-color:rgba(47,191,113,.5);color:#c9ffe0}
  .modal .save{width:100%;margin-top:6px;background:linear-gradient(135deg,#ff7a9a,#ff9d6c);border:none;color:#fff;font-size:16px;font-weight:800;padding:15px;border-radius:16px}
  .modal .cancel{width:100%;margin-top:8px;background:none;border:none;color:rgba(255,255,255,.7);font-size:14px;padding:8px}

  #picker{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;background:#0f1220}
  #picker.show{display:flex}
  #pickerMap{flex:1}
  .crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-100%);z-index:600;pointer-events:none}
  .crosshair svg{filter:drop-shadow(0 5px 5px rgba(0,0,0,.45))}
  .crosshair .dot{position:absolute;left:50%;bottom:-5px;width:10px;height:10px;border-radius:50%;background:rgba(0,0,0,.45);transform:translateX(-50%)}
  .crosshair-hint{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:601;background:rgba(20,22,40,.82);backdrop-filter:blur(10px);

  movePill();render();}
function movePill(){const nav=document.querySelector('.nav');const btns=[...nav.querySelectorAll('button[data-view]')];
  const idx=btns.findIndex(b=>b.dataset.view===view);const w=(nav.clientWidth-12)/btns.length;
  const pill=document.getElementById('pill');pill.style.width=w+'px';pill.style.left=(6+idx*w)+'px';}
function render(){
  if(view==='orders'){teardownMap();document.getElementById('main').innerHTML=renderOrders();}
  else if(view==='dorms'){teardownMap();document.getElementById('main').innerHTML=renderDorms();}
  else if(view==='history'){teardownMap();document.getElementById('main').innerHTML=renderHistory();}
  else if(view==='menu'){teardownMap();document.getElementById('main').innerHTML=renderMenu();}
  else{renderRiderView();}
  updateBadges();}

/* ===== ORDERS ===== */
function orderLines(o){return esc(o.cart&&o.cart.length?cartSummary(o.cart):(o.items||'—'));}
function orderTotal(o){return o.total!=null?o.total:cartTotal(o.cart);}
function renderOrders(){
  const active=orders.filter(o=>o.status==='cooking');
  const pre=orders.filter(o=>o.status==='preorder').sort((a,b)=>a.preAt-b.preAt);
  let warn=0,late=0;
  active.forEach(o=>{const m=elapsed(o.ts)/60;if(m>=LATE_MIN)late++;else if(m>=WARN_MIN)warn++;});
  let html=`<div class="summary">
     <div class="chip"><div class="n">${active.length}</div><div class="l">กำลังทำ</div></div>
     <div class="chip warn"><div class="n">${warn}</div><div class="l">เตือน 30-50น.</div></div>
     <div class="chip danger"><div class="n">${late}</div><div class="l">เกิน 1 ชม.</div></div></div>`;
  // pre-order section
  if(pre.length){
    html+=`<div class="section-h">📅 พรีออเดอร์ (นัดล่วงหน้า) · ${pre.length}</div>`;
    pre.forEach(o=>{const left=Math.round((o.preAt-Date.now())/60000);const soon=left<=30;
      html+=`<div class="card plain" ${soon?'':'style=opacity:.92'}><div class="accent" style="background:#a06bff"></div>
        <div class="row"><div>
          <div class="title">${esc(o.name)}</div>
          <div class="sub">${orderLines(o)}${o.dormId?' · 🏢 '+esc(dormName(o.dormId)):''}</div>
          <span class="badge" style="background:rgba(160,107,255,.28);color:#e6d8ff">📅 ${fmtDT(o.preAt)}</span>
          ${orderTotal(o)?`<span class="badge gray">${baht(orderTotal(o))}</span>`:''}</div>
          <div class="timer"><div class="big" data-pre="${o.preAt}" style="font-size:20px;color:${soon?'#ffd0d8':'#e6d8ff'}">${preLeftText(o.preAt)}</div><div class="lbl">อีก</div></div></div>
        <div class="actions">
          <button class="btn go" onclick="activatePre('${o.id}')">▶ เริ่มทำเลย</button>
          <button class="btn edit" onclick="editOrder('${o.id}')">✎</button>
          <button class="btn del" onclick="delOrder('${o.id}')">🗑</button></div></div>`;});
    if(active.length)html+=`<div class="section-h">🔥 กำลังทำ · ${active.length}</div>`;
  }
  if(!active.length&&!pre.length)return html+`<div class="empty"><div class="big">🦐</div>ยังไม่มีออร์เดอร์<br>กดปุ่ม + เพื่อเพิ่มออร์เดอร์ใหม่</div>`;
  active.sort((a,b)=>a.ts-b.ts);
  active.forEach(o=>{const sec=elapsed(o.ts),min=sec/60,st=statusOf(min),deliver=!!o.dormId,tot=orderTotal(o);
    html+=`<div class="card ${st}"><div class="accent"></div>
      <div class="row"><div>
        <div class="title">${esc(o.name)}</div>
        <div class="sub">${orderLines(o)}${o.ch?' · '+esc(o.ch):''}${o.phone?' · 📞 '+esc(o.phone):''}${o.by?' · 👤'+esc(o.by):''}</div>
        ${deliver?`<span class="dorm">🏢 ${esc(dormName(o.dormId))}</span>`:''}
        ${tot?`<span class="badge gray">${baht(tot)}</span>`:''}
        <span class="badge ${st}">${statusText(min)}</span></div>
        <div class="timer"><div class="big" data-ts="${o.ts}">${mmss(sec)}</div><div class="lbl">นาที</div></div></div>
      <div class="actions">
        <button class="btn go" onclick="completeOrder('${o.id}')">🛵 พร้อมส่ง → ไรเดอร์</button>
        <button class="btn edit" onclick="editOrder('${o.id}')">✎</button>
        <button class="btn del" onclick="delOrder('${o.id}')">🗑</button></div></div>`;});
  return html;
}
function preLeftText(preAt){let m=Math.round((preAt-Date.now())/60000);if(m<=0)return'ถึงเวลา!';if(m<60)return m+' น.';const h=Math.floor(m/60);return h+' ชม.'+(m%60?' '+(m%60)+'น.':'');}
function activatePre(id){const o=orders.find(x=>x.id===id);if(!o)return;o.status='cooking';o.ts=Date.now();o.preAt=null;persist();render();toast('เริ่มทำออร์เดอร์แล้ว 🔥');}
function completeOrder(id){const o=orders.find(x=>x.id===id);if(!o)return;
  askConfirm('🛵','พร้อมส่ง?','ส่ง "'+(o.name||'')+'" เข้าคิวไรเดอร์','🛵 พร้อมส่ง','go',()=>doCompleteOrder(id));}
function doCompleteOrder(id){const o=orders.find(x=>x.id===id);if(!o)return;
  const d=o.dormId?dorms.find(x=>x.id===o.dormId):null;
  const note=(o.cart&&o.cart.length?cartSummary(o.cart):'')+(o.note?(o.cart&&o.cart.length?' | ':'')+o.note:'')+(orderTotal(o)?' ('+baht(orderTotal(o))+')':'');
  stops.push({id:uid(),orderId:o.id,name:o.name,dormId:o.dormId||null,addr:d?d.addr:'',phone:o.phone||'',note:note,
    lat:d?d.lat:null,lng:d?d.lng:null,orderTs:o.ts,createdTs:Date.now(),done:false,startedAt:null}); // orderTs=o.ts → เวลานับต่อเนื่อง
  o.status='delivering';o.done=false;firstFit=true;
  persist();buzz([60]);render();toast('พร้อมส่ง → เข้าคิวไรเดอร์ 🛵');}
function delOrder(id){const o=orders.find(x=>x.id===id);
  askConfirm('🗑','ลบบิลนี้?','"'+((o&&o.name)||'')+'" จะถูกลบถาวร','🗑 ลบบิล','danger',()=>{
    orders=orders.filter(x=>x.id!==id);cloudRemove('orders',id);persist();render();toast('ลบบิลแล้ว');});}

/* ===== HISTORY ===== */
function renderHistory(){
  const done=orders.filter(o=>o.status==='done').sort((a,b)=>(b.doneAt||0)-(a.doneAt||0));
  const t0=new Date();t0.setHours(0,0,0,0);const ts0=t0.getTime();
  const salesAll=done.reduce((s,o)=>s+orderTotal(o),0);
  const doneToday=done.filter(o=>(o.doneAt||0)>=ts0);
  const salesToday=doneToday.reduce((s,o)=>s+orderTotal(o),0);
  let html=`<div class="sales">
     <div class="sales-row"><div class="sbox"><div class="sv">${baht(salesToday)}</div><div class="sl">💰 ยอดขายวันนี้ · ${doneToday.length} ออร์เดอร์</div></div>
       <div class="sbox alt"><div class="sv">${baht(salesAll)}</div><div class="sl">รวมทั้งหมด · ${done.length} ออร์เดอร์</div></div></div></div>
     <div class="summary">
     <div class="chip"><div class="n">${done.length}</div><div class="l">ส่ง/ปิดแล้ว</div></div>
     <div class="chip"><div class="n">${orders.filter(o=>o.status==='delivering').length}</div><div class="l">กำลังส่ง</div></div>
     <div class="chip"><div class="n">${orders.filter(o=>o.status==='cooking').length}</div><div class="l">กำลังทำ</div></div></div>`;
  if(done.length)html+=`<div class="toolbar"><button onclick="clearHistory()">🗑 ล้างประวัติทั้งหมด</button></div>`;
  if(!done.length)return html+`<div class="empty"><div class="big">🧾</div>ยังไม่มีประวัติ<br>ออร์เดอร์ที่ส่งสำเร็จหรือปิดแล้วจะมาอยู่ที่นี่</div>`;
  done.forEach(o=>{
    const dur=o.doneAt?Math.round((o.doneAt-o.ts)/60000):null;
    const t=new Date(o.doneAt||o.ts).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
    const dd=new Date(o.doneAt||o.ts).toLocaleDateString('th-TH',{day:'numeric',month:'short'});
    const deliver=!!o.dormId||!!o.delivered,tot=orderTotal(o);
    html+=`<div class="card ok" style="opacity:.9"><div class="accent"></div>
      <div class="row"><div>
        <div class="title">${esc(o.name)}</div>
        <div class="sub">${orderLines(o)}${o.ch?' · '+esc(o.ch):''}</div>
        ${o.dormId?`<span class="dorm">🏢 ${esc(dormName(o.dormId))}</span>`:deliver?'':'<span class="badge gray">รับหน้าร้าน</span>'}
        ${tot?`<span class="badge gray">${baht(tot)}</span>`:''}
        <span class="badge ok">${deliver?'ส่งสำเร็จ':'ปิดออร์เดอร์'}</span>
        ${o.deliveredBy?`<span class="badge gray">🛵 ${esc(o.deliveredBy)}</span>`:''}</div>
        <div class="timer"><div class="big" style="font-size:16px">${dd}</div><div class="lbl">${t} น.</div>
        ${dur!=null?`<div class="sm">รวม ${dur} นาที</div>`:''}</div></div>
      <div class="actions"><button class="btn del main" onclick="delOrder('${o.id}')">🗑 ลบบิล</button></div></div>`;});
  return html;
}
function clearHistory(){askConfirm('🗑','ล้างประวัติทั้งหมด?','บิลที่ส่ง/ปิดแล้วทุกใบจะถูกลบถาวร','🗑 ล้างทั้งหมด','danger',()=>{
  orders.filter(o=>o.status==='done').forEach(o=>cloudRemove('orders',o.id));
  orders=orders.filter(o=>o.status!=='done');persist();render();toast('ล้างประวัติแล้ว');});}

/* ===== RIDER + MAP ===== */
let map=null,riderMarker=null,stopLayer=null,routeLayer=null,straightLayer=null,presenceLayer=null;
let watchId=null,lastPos=null,follow=true,firstFit=true,lastRouteSig='',lastRouteTime=0;
function renderRiderView(){const main=document.getElementById('main');
  if(!map){main.innerHTML=`
      <div id="mapWrap"><div id="map"></div>
        <div class="map-overlay map-status"><span class="dotpulse off" id="gpsDot"></span><span id="gpsTxt">กำลังหาตำแหน่ง…</span></div>
        <div class="map-overlay map-btns">
          <button class="mbtn on" id="followBtn" onclick="toggleFollow()">🎯</button>
          <button class="mbtn rotbtn" onclick="rotMap(-30)" aria-label="หมุนซ้าย">⟲</button>
          <button class="mbtn rotbtn" onclick="rotMap(30)" aria-label="หมุนขวา">⟳</button>
          <button class="mbtn rotbtn" id="compassBtn" onclick="rotMap(0,true)" aria-label="กลับทิศเหนือ">🧭</button>
        </div>
      </div>
      <div id="riderSummary"></div><div id="stopList"></div>`;
    initMap();}
  renderStopList();drawMap();}
function initMap(){const rot=!!(L.Map.prototype.setBearing);
  map=L.map('map',Object.assign({zoomControl:false},rot?{rotate:true,touchRotate:true,rotateControl:false,bearing:0}:{})).setView(lastPos||BKK,14);
  if(!rot)document.querySelectorAll('.rotbtn').forEach(b=>b.style.display='none');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
  stopLayer=L.layerGroup().addTo(map);routeLayer=L.layerGroup().addTo(map);straightLayer=L.layerGroup().addTo(map);presenceLayer=L.layerGroup().addTo(map);
  map.on('dragstart',()=>{follow=false;const f=document.getElementById('followBtn');f&&f.classList.remove('on');});
  setTimeout(()=>map.invalidateSize(),200);startWatch();drawPresence();}
function teardownMap(){if(map){map.remove();map=null;riderMarker=stopLayer=routeLayer=straightLayer=presenceLayer=null;firstFit=true;}}
function userEmoji(name){const u=USERS.find(x=>x.n===name);return u?u.i:'👤';}
function agoText(ts){if(!ts)return'';const s=Math.floor((Date.now()-ts)/1000);if(s<60)return s+' วิที่แล้ว';const m=Math.floor(s/60);if(m<60)return m+' นาทีที่แล้ว';return Math.floor(m/60)+' ชม.ที่แล้ว';}
function drawPresence(){if(!map||!presenceLayer)return;presenceLayer.clearLayers();
  Object.values(presence||{}).forEach(u=>{if(u.lat==null||u.name===currentUser)return;
    const fresh=Date.now()-(u.at||0)<5*60000;
    const ic=L.divIcon({className:'',html:`<div class="userpin ${fresh?'':'stale'}"><span class="ue">${userEmoji(u.name)}</span><span class="un">${esc(u.name)}</span></div>`,iconSize:[90,30],iconAnchor:[45,15]});
    L.marker([u.lat,u.lng],{icon:ic,zIndexOffset:500}).addTo(presenceLayer).bindPopup('<b>'+esc(u.name)+'</b><br>อัปเดต '+agoText(u.at));});}
function startWatch(){if(!('geolocation'in navigator)){setGps(false,'อุปกรณ์ไม่รองรับ GPS');return;}if(watchId!==null)return;
  watchId=navigator.geolocation.watchPosition(pos=>{lastPos=[pos.coords.latitude,pos.coords.longitude];
    setGps(true,'กำลังติดตามไรเดอร์');updateRider();pushPresence(lastPos[0],lastPos[1]);if(follow&&map)map.setView(lastPos,map.getZoom(),{animate:true});maybeRoute();},
    err=>{setGps(false,err.code===1?'ไม่ได้อนุญาตตำแหน่ง':'หาตำแหน่งไม่ได้');},{enableHighAccuracy:true,maximumAge:5000,timeout:15000});}
function setGps(on,txt){const d=document.getElementById('gpsDot'),t=document.getElementById('gpsTxt');if(d)d.classList.toggle('off',!on);if(t)t.textContent=txt;}
function updateRider(){if(!map||!lastPos)return;
  const ic=L.divIcon({className:'',html:`<div style="display:flex;flex-direction:column;align-items:center;gap:3px;width:120px">
    <span class="userpin"><span class="ue">${userEmoji(currentUser)}</span><span class="un">${esc(currentUser||'ฉัน')}</span></span>
    <div class="rider-dot"></div></div>`,iconSize:[120,52],iconAnchor:[60,41]});
  if(!riderMarker)riderMarker=L.marker(lastPos,{icon:ic,zIndexOffset:1000}).addTo(map);
  else{riderMarker.setLatLng(lastPos);riderMarker.setIcon(ic);}}
function toggleFollow(){follow=!follow;document.getElementById('followBtn').classList.toggle('on',follow);if(follow&&lastPos&&map)map.setView(lastPos,15,{animate:true});}
function rotMap(d,reset){if(!map||!map.setBearing)return;
  const b=reset?0:((map.getBearing()||0)+d);map.setBearing(b);
  const c=document.getElementById('compassBtn');if(c)c.style.transform='rotate('+b+'deg)';
  if(reset)toast('กลับทิศเหนือแล้ว 🧭');}
function pendingWithCoords(){return stops.filter(s=>!s.done&&s.lat!=null);}
function buildingSVG(){return '<svg width="48" height="60" viewBox="0 0 48 60" xmlns="http://www.w3.org/2000/svg">'
  +'<path d="M24 59 L15 45 L33 45 Z" fill="#1a1a1a"/>'
  +'<rect x="18" y="4" width="12" height="6" rx="1.5" fill="#e2596c" stroke="#1a1a1a" stroke-width="2"/>'
  +'<rect x="9" y="9" width="30" height="7" rx="2" fill="#e2596c" stroke="#1a1a1a" stroke-width="2"/>'
  +'<rect x="11" y="15" width="26" height="31" rx="1.5" fill="#5ec7d8" stroke="#1a1a1a" stroke-width="2"/>'
  +'<g stroke="#1a1a1a" stroke-width="1" stroke-linecap="round">'

function drawMap(){if(!map)return;stopLayer.clearLayers();const pend=stops.filter(s=>!s.done);let n=0;const pts=[];
  pend.forEach(s=>{n++;if(s.lat==null)return;
    L.marker([s.lat,s.lng],{icon:stopIcon(s,n)}).addTo(stopLayer).bindPopup(`<b>${esc(s.name)}</b><br>${esc(s.addr||'')}`);pts.push([s.lat,s.lng]);});
  if(firstFit&&(pts.length||lastPos)){const all=[...pts];if(lastPos)all.push(lastPos);
    if(all.length===1)map.setView(all[0],15);else if(all.length)map.fitBounds(all,{padding:[50,50]});firstFit=false;}
  drawStraight();drawPresence();maybeRoute(true);}
function drawStraight(){straightLayer.clearLayers();const pts=pendingWithCoords().map(s=>[s.lat,s.lng]);
  const seq=lastPos?[lastPos,...pts]:pts;if(seq.length>1)L.polyline(seq,{color:'#fff',weight:2,opacity:.35,dashArray:'6,8'}).addTo(straightLayer);}
function maybeRoute(force){const pts=pendingWithCoords().map(s=>s.lat.toFixed(5)+','+s.lng.toFixed(5));
  const seq=(lastPos?[lastPos[0].toFixed(4)+','+lastPos[1].toFixed(4)]:[]).concat(pts);const sig=seq.join('|');const now=Date.now();
  if(!force&&sig===lastRouteSig&&now-lastRouteTime<8000)return;if(seq.length<2){routeLayer&&routeLayer.clearLayers();return;}
  if(now-lastRouteTime<3000&&sig===lastRouteSig)return;lastRouteSig=sig;lastRouteTime=now;
  const coords=[];if(lastPos)coords.push([lastPos[1],lastPos[0]]);pendingWithCoords().forEach(s=>coords.push([s.lng,s.lat]));
  const url='https://router.project-osrm.org/route/v1/driving/'+coords.map(c=>c[0]+','+c[1]).join(';')+'?overview=full&geometries=geojson';
  fetch(url).then(r=>r.json()).then(d=>{if(!map||!routeLayer)return;
    if(d.code==='Ok'&&d.routes&&d.routes[0]){routeLayer.clearLayers();
      const line=d.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);L.polyline(line,{color:'#3a86ff',weight:5,opacity:.9}).addTo(routeLayer);
      const km=(d.routes[0].distance/1000).toFixed(1),min=Math.round(d.routes[0].duration/60);
      const sm=document.getElementById('riderSummary');if(sm){sm.dataset.route=`~${km} กม. · ${min} นาที`;renderStopSummary();}}
  }).catch(()=>{});}

function renderStopList(){const wrap=document.getElementById('stopList');if(!wrap)return;renderStopSummary();

function sortByWait(){const pend=stops.filter(s=>!s.done),done=stops.filter(s=>s.done);

function moveStop(i,dir){const j=i+dir;if(j<0||j>=stops.length)return;[stops[i],stops[j]]=[stops[j],stops[i]];persist();renderStopList();drawMap();}

function deliverStop(id){const s=stops.find(x=>x.id===id);if(!s)return;
  askConfirm('✅','ส่งจบงาน?','"'+(s.name||'')+'" จะย้ายไปหน้าประวัติ','✓ ส่งจบงาน','ok',()=>doDeliverStop(id));}
function doDeliverStop(id){const s=stops.find(x=>x.id===id);if(!s)return;const now=Date.now();

  else{orders.push({id:uid(),name:s.name||'จุดส่ง',status:'done',done:true,ts:s.orderTs||s.createdTs||now,createdAt:s.createdTs||now,
    doneAt:now,cart:[],dormId:s.dormId||null,deliveredBy:currentUser,delivered:true});}
  stops=stops.filter(x=>x.id!==id);cloudRemove('stops',id);

  document.getElementById('modalBg').classList.add('show');setTimeout(()=>document.getElementById('sName').focus(),300);}
function pickForNew(){openPicker(stagedLoc||lastPos,(lat,lng)=>{stagedLoc=[lat,lng];const b=document.getElementById('locBtn');b.classList.add('set');b.textContent='✓ ปักหมุดแล้ว (แตะเพื่อแก้)';});}
function saveStop(){const name=document.getElementById('sName').value.trim();if(!name){document.getElementById('sName').focus();return;}
  const dormId=document.getElementById('sDormVal').value||null;const now=Date.now();
  stops.push({id:uid(),name,dormId,addr:document.getElementById('sAddr').value.trim(),phone:document.getElementById('sPhone').value.trim(),note:'',
    lat:stagedLoc?stagedLoc[0]:null,lng:stagedLoc?stagedLoc[1]:null,orderTs:now,createdTs:now,done:false,startedAt:null});
  persist();closeModal();firstFit=true;render();}

function openDormModal(edit){const d=edit?dorms.find(x=>x.id===edit):null;stagedLoc=d&&d.lat!=null?[d.lat,d.lng]:null;
  document.getElementById('modalBox').innerHTML=`
    <h2>${d?'✎ แก้ไขหอพัก':'➕ เพิ่มหอพักประจำ'}</h2>
    <div class="field"><label>ชื่อหอพัก / จุดส่ง</label><input id="dName" placeholder="เช่น หอพักสุขใจ / คอนโดริมน้ำ" autocomplete="off" value="${d?esc(d.name):''}"></div>
    <div class="field"><label>ที่อยู่ / จุดสังเกต</label><textarea id="dAddr" placeholder="เช่น ซอย 5 ตรงข้าม 7-11">${d?esc(d.addr||''):''}</textarea></div>
    <div class="field"><button class="locbtn ${stagedLoc?'set':''}" id="locBtn" onclick="pickForDorm()">${stagedLoc?'✓ ปักหมุดแล้ว (แตะเพื่อแก้)':'📍 ปักตำแหน่งหอพัก'}</button></div>
    <div class="field"><label>หรือวางลิงก์ Google Maps</label>
      <div style="display:flex;gap:8px"><input id="dGmap" placeholder="วางลิงก์ เช่น https://maps.google.com/..." autocomplete="off" style="flex:1;min-width:0">
      <button class="btn go" style="flex:0 0 auto;padding:0 14px" onclick="importGmap()">📥 ดึงพิกัด</button></div>
      <div style="font-size:11px;opacity:.65;margin-top:5px;line-height:1.5">ลิงก์สั้น (maps.app.goo.gl) ให้เปิดลิงก์ในเบราว์เซอร์ก่อน แล้วคัดลอกลิงก์ยาวจากช่องที่อยู่มาวาง</div></div>
    <button class="save" onclick="saveDorm('${edit||''}')">${d?'บันทึก':'เพิ่มหอพัก +'}</button>
    <button class="cancel" onclick="closeModal()">ยกเลิก</button>`;
  document.getElementById('modalBg').classList.add('show');if(!d)setTimeout(()=>document.getElementById('dName').focus(),300);}
function editDorm(id){openDormModal(id);}
function pickForDorm(){openPicker(stagedLoc||lastPos,(lat,lng)=>{stagedLoc=[lat,lng];const b=document.getElementById('locBtn');b.classList.add('set');b.textContent='✓ ปักหมุดแล้ว (แตะเพื่อแก้)';});}
/* ===== ดึงพิกัดจากลิงก์ Google Maps ===== */
function parseGmapLL(t){t=String(t||'');try{t=decodeURIComponent(t);}catch(e){}
  let m;
  if(m=t.match(/@(-?\d{1,2}\.\d+),(-?\d{1,3}\.\d+)/))return[+m[1],+m[2]];
  if(m=t.match(/!3d(-?\d{1,2}\.\d+)!4d(-?\d{1,3}\.\d+)/))return[+m[1],+m[2]];
  if(m=t.match(/[?&](?:q|query|ll|daddr|destination)=(-?\d{1,2}\.\d+)\s*,\s*(-?\d{1,3}\.\d+)/))return[+m[1],+m[2]];
  if(m=t.match(/(-?\d{1,2}\.\d{4,})\s*,\s*(-?\d{1,3}\.\d{4,})/))return[+m[1],+m[2]];
  return null;}
function importGmap(){const el=document.getElementById('dGmap');const v=el?el.value.trim():'';if(!v){toast('วางลิงก์ก่อนครับ');return;}
  const ll=parseGmapLL(v);
  if(ll&&ll[0]>=-90&&ll[0]<=90){stagedLoc=ll;
    const b=document.getElementById('locBtn');if(b){b.classList.add('set');b.textContent='✓ ปักหมุดจากลิงก์แล้ว ('+ll[0].toFixed(5)+', '+ll[1].toFixed(5)+')';}
    toast('ดึงพิกัดสำเร็จ 📍');}
  else if(/goo\.gl|maps\.app/.test(v)){toast('ลิงก์สั้นไม่มีพิกัด — เปิดลิงก์ก่อนแล้วคัดลอกลิงก์ยาวมาวาง');}
  else toast('อ่านพิกัดไม่ได้ ลองคัดลอกลิงก์ใหม่');}
function saveDorm(edit){const name=document.getElementById('dName').value.trim();if(!name){document.getElementById('dName').focus();return;}
  const data={name,addr:document.getElementById('dAddr').value.trim(),lat:stagedLoc?stagedLoc[0]:null,lng:stagedLoc?stagedLoc[1]:null};
  if(edit){Object.assign(dorms.find(x=>x.id===edit),data);}else dorms.push(Object.assign({id:uid()},data));
  persist();closeModal();render();}

/* ===== Map picker ===== */
let pickerMap=null,pickerCb=null;
function openPicker(init,cb){pickerCb=cb;document.getElementById('picker').classList.add('show');const center=init||lastPos||BKK;
  setTimeout(()=>{if(!pickerMap){pickerMap=L.map('pickerMap',Object.assign({zoomControl:false,attributionControl:false},L.Map.prototype.setBearing?{rotate:true,touchRotate:true}:{})).setView(center,init?17:15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(pickerMap);}else pickerMap.setView(center,init?17:15);
    pickerMap.invalidateSize();},150);}
function pickerLocate(){if(!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(p=>{pickerMap&&pickerMap.setView([p.coords.latitude,p.coords.longitude],17);},()=>{},{enableHighAccuracy:true});}
function confirmPicker(){if(pickerMap&&pickerCb){const c=pickerMap.getCenter();pickerCb(c.lat,c.lng);}closePicker();}
function closePicker(){document.getElementById('picker').classList.remove('show');pickerCb=null;}
function editStopLoc(id){const s=stops.find(x=>x.id===id);if(!s)return;openPicker(s.lat!=null?[s.lat,s.lng]:(lastPos||BKK),(lat,lng)=>{s.lat=lat;s.lng=lng;persist();firstFit=true;renderStopList();drawMap();});}

/* ===== tick ===== */
function tick(){
  document.querySelectorAll('.timer .big[data-ts]').forEach(el=>{const sec=elapsed(+el.dataset.ts);el.textContent=mmss(sec);
    const card=el.closest('.card'),min=sec/60,st=statusOf(min);TIER_CLS.forEach(c=>card.classList.remove(c));card.classList.add(st);
    const b=card.querySelector('.badge:not(.gray)');if(b){b.className='badge '+st;b.textContent=statusText(min);}});
  document.querySelectorAll('.timer .big[data-base]').forEach(el=>{const sec=elapsed(+el.dataset.base);el.textContent=mmss(sec);
    const card=el.closest('.card');if(card&&!card.style.opacity){const min=sec/60,st=statusOf(min);
      TIER_CLS.forEach(c=>card.classList.remove(c));card.classList.add(st);
      const b=card.querySelector('.badge:not(.gray)');if(b){b.className='badge '+st;b.textContent=statusText(min);}}});
  document.querySelectorAll('.timer .big[data-pre]').forEach(el=>{el.textContent=preLeftText(+el.dataset.pre);});
  document.querySelectorAll('[data-onway]').forEach(el=>{el.textContent=mmss(elapsed(+el.dataset.onway));});
  checkPre();updateBadges();checkAlerts();}
let alerted={},preAlerted={};
function checkPre(){let changed=false;
  orders.filter(o=>o.status==='preorder').forEach(o=>{const left=o.preAt-Date.now();
    if(left<=0){o.status='cooking';o.ts=Date.now();o.preAt=null;buzz([220,100,220,100,220]);toast('⏰ ถึงเวลาทำพรีออเดอร์: '+o.name);changed=true;}
    else if(left<=15*60000&&!preAlerted[o.id]){preAlerted[o.id]=1;buzz([160,80,160]);toast('📅 อีก 15 นาที ถึงคิวพรีออเดอร์: '+o.name);}});
  if(changed){persist();if(view==='orders')render();}}
function checkAlerts(){orders.filter(o=>o.status==='cooking').forEach(o=>{const lvl=alertLevel(elapsed(o.ts)/60);
  const prev=alerted[o.id]||0;if(lvl>prev){alerted[o.id]=lvl;buzz(lvl>=4?[220,100,220,100,220]:lvl>=3?[180,90,180]:lvl>=2?[140,70,140]:[120]);}});}
function buzz(p){if(navigator.vibrate)navigator.vibrate(p);}
function updateBadges(){const oLate=orders.filter(o=>o.status==='cooking'&&elapsed(o.ts)/60>=WARN_MIN).length;
  const co=document.getElementById('cntOrders');co.textContent=oLate;co.parentNode.classList.toggle('hasnew',oLate>0);
  const rPend=stops.filter(s=>!s.done).length;const cr=document.getElementById('cntRider');cr.textContent=rPend;cr.parentNode.classList.toggle('hasnew',rPend>0);}

/* ===== login ===== */
function renderLoginOpts(){document.getElementById('loginOpts').innerHTML=USERS.map(u=>
  `<button class="login-opt" onclick="doLogin('${u.n}')"><span class="ic">${u.i}</span><span>${u.n}</span></button>`).join('');}
function showLogin(){renderLoginOpts();document.getElementById('login').classList.add('show');}
function doLogin(name){currentUser=name;store.save('gp_user',name);document.getElementById('login').classList.remove('show');updateUserChip();startWatch();toast('เข้าระบบเป็น '+name);}
function logout(){showLogin();}
function updateUserChip(){const c=document.getElementById('userChip');const u=USERS.find(x=>x.n===currentUser);
  c.textContent=(u?u.i:'👤')+' '+(currentUser||'เลือกผู้ใช้');}

/* ===== back button ===== */
function closeTopUI(){
  const cf=document.getElementById('confirmPop');if(cf&&cf.classList.contains('show')){cfClose();return true;}
  const ex=document.getElementById('exitPop');if(ex&&ex.classList.contains('show')){hideExit();return true;}
  const mp=document.getElementById('menuPick');if(mp&&mp.classList.contains('show')){closeMenuPick();return true;}
  const pk=document.getElementById('picker');if(pk&&pk.classList.contains('show')){closePicker();return true;}
  const mb=document.getElementById('modalBg');if(mb&&mb.classList.contains('show')){closeModal();return true;}
  return false;
}
function handleBack(){
  const lg=document.getElementById('login');if(lg&&lg.classList.contains('show'))return;
  if(closeTopUI())return;
  if(view!=='orders'){switchView('orders');return;}
  showExit();
}
/* ===== confirm popup (กันมือไปโดน) ===== */
let _cfCb=null;
function askConfirm(icon,title,sub,btnTxt,cls,cb){_cfCb=cb;
  document.getElementById('cfIcon').textContent=icon||'⚠️';
  document.getElementById('cfTitle').textContent=title;
  document.getElementById('cfSub').textContent=sub||'';
  const b=document.getElementById('cfOk');b.textContent=btnTxt||'ยืนยัน';b.className=cls||'danger';
  document.getElementById('confirmPop').classList.add('show');}
function cfClose(){document.getElementById('confirmPop').classList.remove('show');_cfCb=null;}
function cfOk(){const cb=_cfCb;cfClose();cb&&cb();}

function showExit(){document.getElementById('exitPop').classList.add('show');}
function hideExit(){document.getElementById('exitPop').classList.remove('show');}
function getAppPlugin(){try{
  if(!window.Capacitor)return null;
  if(Capacitor.Plugins&&Capacitor.Plugins.App&&Capacitor.Plugins.App.addListener)return Capacitor.Plugins.App;
  if(Capacitor.registerPlugin){if(!window._appPlug)window._appPlug=Capacitor.registerPlugin('App');return window._appPlug;}
}catch(e){}return null;}
function doExit(){const A=getAppPlugin();if(A&&A.exitApp){A.exitApp();}else{hideExit();history.back();}}
let _backTries=0,_backMode='';
function initBack(){
  const A=getAppPlugin();
  if(A&&A.addListener){
    try{A.addListener('backButton',()=>handleBack());_backMode='native';return;}catch(e){}
  }
  if(window.Capacitor&&_backTries<10){_backTries++;setTimeout(initBack,300);return;} /* bridge ยังไม่พร้อม ลองใหม่ */
  try{history.pushState({a:1},'');window.addEventListener('popstate',()=>{handleBack();history.pushState({a:1},'');});_backMode='history';}catch(e){}
}

/* ===== boot ===== */
fmtClock();setInterval(fmtClock,10000);setInterval(tick,1000);
updateUserChip();showLogin();initFirebase();initBack();
window.addEventListener('resize',movePill);movePill();render();

/* ===== PWA ===== */
if('serviceWorker'in navigator){
  const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>self.clients.claim());self.addEventListener('fetch',e=>{});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{});
  const manifest={name:"ร้านกุ้งเผา",short_name:"กุ้งเผา",display:"standalone",background_color:"#0f1220",theme_color:"#0f1220",start_url:".",
    icons:[{src:"data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><rect width="512" height="512" rx="110" fill="#0f1220"/><text x="50%" y="58%" font-size="300" text-anchor="middle" dominant-baseline="middle">🦐</text></svg>'),sizes:"512x512",type:"image/svg+xml"}]};
  const link=document.createElement('link');link.rel='manifest';link.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/json'}));
  document.head.appendChild(link);
}
